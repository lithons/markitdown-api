name: Generate Kiota clients

on:
  push:
    branches: [main]
    paths:
      - "src/markitdown-api/openapi.json"
  pull_request:
    paths:
      - "src/markitdown-api/openapi.json"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - lang: CSharp
            client_class: PythonApiClient
            namespace: Lithons.PythonApi
            output: src/clients/csharp
          - lang: TypeScript
            client_class: PythonApiClient
            # For TS, this is the module name. Avoid dots in package/module names.
            namespace: LithonsPythonApi
            output: src/clients/typescript

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Kiota
        uses: microsoft/setup-kiota@v0

      - name: Generate ${{ matrix.lang }} client
        run: |
          kiota generate \
            -d src/markitdown-api/openapi.json \
            -l ${{ matrix.lang }} \
            -c ${{ matrix.client_class }} \
            -n ${{ matrix.namespace }} \
            -o ${{ matrix.output }}

      # On PRs: ensure the repo stays clean (fail if generation produces changes)
      - name: Verify no diff on PRs
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          if ! git diff --quiet; then
            echo "::error::Generated clients are out of date. Push a change to openapi.json or run the workflow on main."
            git status --porcelain
            exit 1
          fi

      # On pushes to main: auto-commit the regenerated clients
      - name: Commit generated clients
        if: ${{ github.event_name == 'push' }}
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(kiota): regenerate clients (CSharp & TypeScript)"
          file_pattern: |
            src/clients/csharp/**
            src/clients/typescript/**
